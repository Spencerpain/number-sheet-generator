<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Number Sheet Generator</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: #f0f4f8;
      color: #333;
      padding: 24px 16px;
    }

    h1 {
      text-align: center;
      font-size: 2rem;
      margin-bottom: 6px;
      color: #2c3e50;
    }

    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 24px;
      font-size: 0.95rem;
    }

    .panel {
      background: white;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      max-width: 860px;
      margin-left: auto;
      margin-right: auto;
    }

    .panel h2 {
      font-size: 1rem;
      color: #555;
      margin-bottom: 16px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      align-items: flex-end;
      margin-bottom: 16px;
    }

    .row:last-child { margin-bottom: 0; }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    label {
      font-size: 0.85rem;
      font-weight: bold;
      color: #555;
    }

    input[type="number"], input[type="text"], select {
      padding: 10px 12px;
      border: 2px solid #ddd;
      border-radius: 8px;
      font-size: 1rem;
      transition: border-color 0.2s;
    }

    input[type="number"] { width: 130px; }
    input[type="text"]   { width: 280px; }
    select               { width: 210px; cursor: pointer; }

    input:focus, select:focus {
      outline: none;
      border-color: #4CAF50;
    }

    .btn {
      padding: 11px 22px;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: filter 0.15s, transform 0.1s;
    }

    .btn:hover  { filter: brightness(1.08); }
    .btn:active { transform: scale(0.97); }

    .btn-green  { background: #4CAF50; color: white; }
    .btn-blue   { background: #2196F3; color: white; }
    .btn-orange { background: #FF9800; color: white; }
    .btn-grey   { background: #9E9E9E; color: white; }
    .btn-purple { background: #9C27B0; color: white; }
    .btn-teal   { background: #009688; color: white; }

    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid white;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .divider { border: none; border-top: 1px solid #eee; margin: 20px 0; }

    /* Preview banner */
    .preview-banner {
      background: #fff8e1;
      border: 2px solid #FFB300;
      border-radius: 10px;
      padding: 14px 20px;
      margin-bottom: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
      max-width: 860px;
      margin-left: auto;
      margin-right: auto;
    }

    .preview-banner span { font-weight: bold; color: #5d4037; }

    #sheetsContainer {
      max-width: 860px;
      margin: 0 auto;
    }

    .sheet-wrapper {
      background: white;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .sheet-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .sheet-label {
      font-size: 0.9rem;
      color: #888;
      font-weight: bold;
    }

    .sheet-actions { display: flex; gap: 10px; }

    /* Printed title inside sheet */
    .sheet-print-title {
      text-align: center;
      font-size: 1.2rem;
      font-weight: bold;
      margin-bottom: 10px;
      color: #222;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      gap: 3px;
    }

    .cell {
      aspect-ratio: 1;
      border: 2px solid #aaa;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(10px, 1.8vw, 18px);
      font-weight: bold;
      min-height: 44px;
    }

    .cell.filled      { background: #f7f7f7; color: #222; }
    .cell.blank       { background: white; }
    .cell.placeholder { border: none; background: transparent; }

    /* ── Math Problems ── */
    .math-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px 24px;
    }

    .math-problem {
      display: flex;
      align-items: center;
      font-size: 1.3rem;
      font-weight: bold;
      gap: 6px;
      padding: 8px 4px;
      border-bottom: 2px solid #ccc;
    }

    .math-answer-line {
      display: inline-block;
      width: 60px;
      border-bottom: 3px solid #333;
      height: 1.4em;
      vertical-align: bottom;
    }

    @media (max-width: 600px) {
      .math-grid { grid-template-columns: repeat(2, 1fr); }
    }

    .error {
      background: #fdecea;
      color: #c62828;
      padding: 10px 14px;
      border-radius: 8px;
      margin-bottom: 12px;
      font-size: 0.9rem;
      max-width: 860px;
      margin-left: auto;
      margin-right: auto;
    }

    @media print {
      body { background: white; padding: 0; }

      h1, .subtitle, .panel, .sheet-header,
      .preview-banner, .no-print { display: none !important; }

      #sheetsContainer { max-width: 100%; margin: 0; }

      .sheet-wrapper {
        box-shadow: none;
        border-radius: 0;
        padding: 12px;
        margin-bottom: 0;
        page-break-after: always;
      }

      .sheet-wrapper:last-child { page-break-after: avoid; }

      .cell { border-color: #555; min-height: 36px; font-size: 13px; }

      .sheet-print-title { font-size: 1rem; margin-bottom: 8px; }

      .math-grid { grid-template-columns: repeat(3, 1fr); gap: 10px 20px; }
      .math-problem { font-size: 1.1rem; }
    }
  </style>
</head>
<body>

  <h1>Number Sheet Generator</h1>
  <p class="subtitle">Generate fill-in-the-blank number sheets — ready to print</p>

  <div class="panel no-print">
    <h2>Sheet Settings</h2>
    <div class="row">
      <div class="field">
        <label for="startNum">Start Number</label>
        <input type="number" id="startNum" value="1" min="0" />
      </div>
      <div class="field">
        <label for="endNum">End Number</label>
        <input type="number" id="endNum" value="100" min="1" />
      </div>
      <div class="field">
        <label for="countBy">Count By</label>
        <select id="countBy">
          <option value="1" selected>1s</option>
          <option value="2">2s</option>
          <option value="5">5s</option>
          <option value="10">10s</option>
        </select>
      </div>
      <div class="field">
        <label for="difficulty">Difficulty</label>
        <select id="difficulty">
          <option value="easy">Easy — few blanks (~20%)</option>
          <option value="medium" selected>Medium — some blanks (~50%)</option>
          <option value="hard">Hard — many blanks (~75%)</option>
        </select>
      </div>
    </div>
    <div class="row">
      <div class="field">
        <label for="sheetTitle">Sheet Title (optional)</label>
        <input type="text" id="sheetTitle" placeholder="e.g. Monday Practice" />
      </div>
      <div class="field">
        <label>&nbsp;</label>
        <button class="btn btn-green" onclick="generateSingle()">Generate Sheet</button>
      </div>
    </div>

    <hr class="divider" />

    <h2>Mass Generate &amp; Print</h2>
    <div class="row">
      <div class="field">
        <label for="massCount">Number of Pages</label>
        <select id="massCount" onchange="toggleCustom()">
          <option value="10">10 pages</option>
          <option value="15">15 pages</option>
          <option value="20">20 pages</option>
          <option value="custom">Custom amount</option>
        </select>
      </div>
      <div class="field" id="customField" style="display:none;">
        <label for="customCount">Custom Amount</label>
        <input type="number" id="customCount" value="5" min="1" max="200" />
      </div>
      <div class="field">
        <label>&nbsp;</label>
        <button class="btn btn-purple" onclick="previewMass()">Generate Pages</button>
      </div>
      <div class="field">
        <label>&nbsp;</label>
        <button class="btn btn-orange" onclick="printMass()">Print All</button>
      </div>
    </div>
  </div>

  <!-- ── Math Problems Panel ── -->
  <div class="panel no-print">
    <h2>Math Problems</h2>
    <div class="row">
      <div class="field">
        <label for="mathOp">Operation</label>
        <select id="mathOp">
          <option value="+">Addition (+)</option>
          <option value="-">Subtraction (−)</option>
          <option value="×">Multiplication (×)</option>
          <option value="÷">Division (÷)</option>
          <option value="mixed">Mixed (all four)</option>
        </select>
      </div>
      <div class="field">
        <label for="mathMin">Min Number</label>
        <input type="number" id="mathMin" value="1" min="0" />
      </div>
      <div class="field">
        <label for="mathMax">Max Number</label>
        <input type="number" id="mathMax" value="10" min="1" />
      </div>
      <div class="field">
        <label for="mathCount">Problems per Page</label>
        <input type="number" id="mathCount" value="30" min="1" max="100" />
      </div>
    </div>
    <div class="row">
      <div class="field">
        <label for="mathTitle">Sheet Title (optional)</label>
        <input type="text" id="mathTitle" placeholder="e.g. Addition Practice" />
      </div>
      <div class="field">
        <label>&nbsp;</label>
        <button class="btn btn-green" onclick="generateMathSingle()">Generate Sheet</button>
      </div>
    </div>

    <hr class="divider" />

    <h2>Mass Generate &amp; Print</h2>
    <div class="row">
      <div class="field">
        <label for="mathMassCount">Number of Pages</label>
        <select id="mathMassCount" onchange="toggleMathCustom()">
          <option value="10">10 pages</option>
          <option value="15">15 pages</option>
          <option value="20">20 pages</option>
          <option value="custom">Custom amount</option>
        </select>
      </div>
      <div class="field" id="mathCustomField" style="display:none;">
        <label for="mathCustomCount">Custom Amount</label>
        <input type="number" id="mathCustomCount" value="5" min="1" max="200" />
      </div>
      <div class="field">
        <label>&nbsp;</label>
        <button class="btn btn-purple" onclick="generateMathMass()">Generate Pages</button>
      </div>
      <div class="field">
        <label>&nbsp;</label>
        <button class="btn btn-orange" onclick="printMathMass()">Print All</button>
      </div>
    </div>
  </div>

  <div id="mathErrorBox"></div>
  <div id="mathPreviewBanner" style="display:none;" class="no-print">
    <div class="preview-banner">
      <span id="mathPreviewLabel"></span>
      <div style="display:flex;gap:10px;flex-wrap:wrap;">
        <button class="btn btn-orange" onclick="printMathMass()">🖨️ Print All</button>
        <button class="btn btn-grey" onclick="clearMathPreview()">✕ Clear</button>
      </div>
    </div>
  </div>
  <div id="mathSheetsContainer"></div>

  <div id="errorBox"></div>
  <div id="previewBanner" style="display:none;" class="no-print">
    <div class="preview-banner">
      <span id="previewLabel"></span>
      <div style="display:flex;gap:10px;flex-wrap:wrap;">
        <button class="btn btn-orange" onclick="printMass()">🖨️ Print All</button>
        <button class="btn btn-grey" onclick="clearPreview()">✕ Clear</button>
      </div>
    </div>
  </div>
  <div id="sheetsContainer"></div>

  <script>
    const BLANK_RATES = { easy: 0.20, medium: 0.50, hard: 0.75 };
    let massGenerated = false;

    function toggleCustom() {
      const val = document.getElementById('massCount').value;
      document.getElementById('customField').style.display = val === 'custom' ? 'flex' : 'none';
    }

    function showError(msg) {
      document.getElementById('errorBox').innerHTML =
        `<div class="error no-print">${msg}</div>`;
    }

    function clearError() {
      document.getElementById('errorBox').innerHTML = '';
    }

    function getSettings() {
      clearError();
      const start  = parseInt(document.getElementById('startNum').value);
      const end    = parseInt(document.getElementById('endNum').value);
      const diff   = document.getElementById('difficulty').value;
      const step   = parseInt(document.getElementById('countBy').value);
      const title  = document.getElementById('sheetTitle').value.trim();

      if (isNaN(start) || isNaN(end)) {
        showError('Please enter valid start and end numbers.');
        return null;
      }
      if (end <= start) {
        showError('End number must be greater than start number.');
        return null;
      }
      const count = Math.floor((end - start) / step) + 1;
      if (count > 2000) {
        showError('Too many numbers — reduce the range or increase the count-by step.');
        return null;
      }
      return { start, end, diff, step, title };
    }

    function getMassCount() {
      const sel = document.getElementById('massCount').value;
      const count = sel === 'custom'
        ? parseInt(document.getElementById('customCount').value)
        : parseInt(sel);
      if (!count || count < 1 || count > 200) {
        showError('Please enter a number of pages between 1 and 200.');
        return null;
      }
      return count;
    }

    function buildCells(start, end, step, diff) {
      const rate   = BLANK_RATES[diff];
      const nums   = [];
      for (let n = start; n <= end; n += step) nums.push(n);

      const rows  = Math.ceil(nums.length / 10);
      const cells = [];

      for (let i = 0; i < rows * 10; i++) {
        if (i >= nums.length) {
          cells.push({ type: 'placeholder', label: '' });
        } else {
          const blank = Math.random() < rate;
          cells.push({ type: blank ? 'blank' : 'filled', label: String(nums[i]) });
        }
      }
      return cells;
    }

    function renderGrid(cells) {
      const grid = document.createElement('div');
      grid.className = 'grid';
      cells.forEach(c => {
        const div = document.createElement('div');
        div.className = `cell ${c.type}`;
        if (c.type === 'filled') div.textContent = c.label;
        grid.appendChild(div);
      });
      return grid;
    }

    function buildSheetWrapper(cells, index, total, opts, isSingle) {
      const wrapper = document.createElement('div');
      wrapper.className = 'sheet-wrapper';

      // Screen-only header
      const header = document.createElement('div');
      header.className = 'sheet-header no-print';

      const label = document.createElement('span');
      label.className = 'sheet-label';
      label.textContent = total > 1
        ? `Sheet ${index} of ${total}`
        : `${opts.start} to ${opts.end} — count by ${opts.step}s`;
      header.appendChild(label);

      if (isSingle) {
        const actions = document.createElement('div');
        actions.className = 'sheet-actions';

        const printBtn = document.createElement('button');
        printBtn.className = 'btn btn-blue';
        printBtn.textContent = '🖨️ Print';
        printBtn.onclick = () => window.print();

        const regenBtn = document.createElement('button');
        regenBtn.className = 'btn btn-grey';
        regenBtn.textContent = '🔄 Regenerate';
        regenBtn.onclick = generateSingle;

        actions.appendChild(printBtn);
        actions.appendChild(regenBtn);
        header.appendChild(actions);
      }

      wrapper.appendChild(header);

      // Printed title (shows on paper)
      if (opts.title) {
        const t = document.createElement('div');
        t.className = 'sheet-print-title';
        t.textContent = opts.title;
        wrapper.appendChild(t);
      }

      wrapper.appendChild(renderGrid(cells));
      return wrapper;
    }

    function generateSingle() {
      const s = getSettings();
      if (!s) return;
      massGenerated = false;
      document.getElementById('previewBanner').style.display = 'none';

      const cells = buildCells(s.start, s.end, s.step, s.diff);
      const container = document.getElementById('sheetsContainer');
      container.innerHTML = '';
      container.appendChild(buildSheetWrapper(cells, 1, 1, s, true));
    }

    function previewMass() {
      const s = getSettings();
      if (!s) return;
      const count = getMassCount();
      if (!count) return;

      const container = document.getElementById('sheetsContainer');
      container.innerHTML = '';

      for (let i = 1; i <= count; i++) {
        const cells = buildCells(s.start, s.end, s.step, s.diff);
        container.appendChild(buildSheetWrapper(cells, i, count, s, false));
      }

      massGenerated = true;
      const banner = document.getElementById('previewBanner');
      banner.style.display = 'block';
      document.getElementById('previewLabel').textContent =
        `Previewing ${count} sheet${count > 1 ? 's' : ''} — count by ${s.step}s, ${s.start} to ${s.end}`;

      banner.scrollIntoView({ behavior: 'smooth' });
    }

    function printMass() {
      if (!massGenerated) {
        previewMass();
        setTimeout(() => window.print(), 500);
      } else {
        window.print();
      }
    }

    function clearPreview() {
      document.getElementById('sheetsContainer').innerHTML = '';
      document.getElementById('previewBanner').style.display = 'none';
      massGenerated = false;
    }

    // ── Math Problems ──────────────────────────
    const OPS = ['+', '-', '×', '÷'];
    let mathMassGenerated = false;

    function toggleMathCustom() {
      const val = document.getElementById('mathMassCount').value;
      document.getElementById('mathCustomField').style.display = val === 'custom' ? 'flex' : 'none';
    }

    function showMathError(msg) {
      document.getElementById('mathErrorBox').innerHTML =
        `<div class="error no-print">${msg}</div>`;
    }

    function clearMathError() {
      document.getElementById('mathErrorBox').innerHTML = '';
    }

    function getMathSettings() {
      clearMathError();
      const op    = document.getElementById('mathOp').value;
      const min   = parseInt(document.getElementById('mathMin').value);
      const max   = parseInt(document.getElementById('mathMax').value);
      const count = parseInt(document.getElementById('mathCount').value);
      const title = document.getElementById('mathTitle').value.trim();

      if (isNaN(min) || isNaN(max) || isNaN(count)) {
        showMathError('Please fill in all number fields.');
        return null;
      }
      if (max <= min) {
        showMathError('Max number must be greater than min number.');
        return null;
      }
      if (count < 1 || count > 100) {
        showMathError('Problems per page must be between 1 and 100.');
        return null;
      }
      return { op, min, max, count, title };
    }

    function randInt(a, b) {
      return Math.floor(Math.random() * (b - a + 1)) + a;
    }

    function buildMathProblems(s) {
      const problems = [];
      for (let i = 0; i < s.count; i++) {
        const op = s.op === 'mixed' ? OPS[Math.floor(Math.random() * OPS.length)] : s.op;
        let a = randInt(s.min, s.max);
        let b = randInt(s.min, s.max);

        if (op === '-' && b > a) [a, b] = [b, a];  // keep result positive
        if (op === '÷') {
          // Make sure it divides evenly
          b = randInt(1, s.max);
          a = b * randInt(s.min || 1, Math.max(s.min || 1, s.max));
        }

        problems.push({ a, b, op });
      }
      return problems;
    }

    function renderMathGrid(problems) {
      const grid = document.createElement('div');
      grid.className = 'math-grid';
      problems.forEach(p => {
        const div = document.createElement('div');
        div.className = 'math-problem';
        div.innerHTML = `${p.a} ${p.op} ${p.b} = <span class="math-answer-line"></span>`;
        grid.appendChild(div);
      });
      return grid;
    }

    function buildMathWrapper(problems, index, total, s, isSingle) {
      const wrapper = document.createElement('div');
      wrapper.className = 'sheet-wrapper';

      const header = document.createElement('div');
      header.className = 'sheet-header no-print';

      const label = document.createElement('span');
      label.className = 'sheet-label';
      label.textContent = total > 1 ? `Sheet ${index} of ${total}` : `${s.count} problems — ${s.op === 'mixed' ? 'Mixed' : s.op}`;
      header.appendChild(label);

      if (isSingle) {
        const actions = document.createElement('div');
        actions.className = 'sheet-actions';

        const printBtn = document.createElement('button');
        printBtn.className = 'btn btn-blue';
        printBtn.textContent = '🖨️ Print';
        printBtn.onclick = () => window.print();

        const regenBtn = document.createElement('button');
        regenBtn.className = 'btn btn-grey';
        regenBtn.textContent = '🔄 Regenerate';
        regenBtn.onclick = generateMathSingle;

        actions.appendChild(printBtn);
        actions.appendChild(regenBtn);
        header.appendChild(actions);
      }

      wrapper.appendChild(header);

      if (s.title) {
        const t = document.createElement('div');
        t.className = 'sheet-print-title';
        t.textContent = s.title;
        wrapper.appendChild(t);
      }

      wrapper.appendChild(renderMathGrid(problems));
      return wrapper;
    }

    function generateMathSingle() {
      const s = getMathSettings();
      if (!s) return;
      mathMassGenerated = false;
      document.getElementById('mathPreviewBanner').style.display = 'none';

      const problems = buildMathProblems(s);
      const container = document.getElementById('mathSheetsContainer');
      container.innerHTML = '';
      container.appendChild(buildMathWrapper(problems, 1, 1, s, true));
      container.scrollIntoView({ behavior: 'smooth' });
    }

    function getMathMassCount() {
      const sel = document.getElementById('mathMassCount').value;
      const count = sel === 'custom'
        ? parseInt(document.getElementById('mathCustomCount').value)
        : parseInt(sel);
      if (!count || count < 1 || count > 200) {
        showMathError('Please enter a number of pages between 1 and 200.');
        return null;
      }
      return count;
    }

    function generateMathMass() {
      const s = getMathSettings();
      if (!s) return;
      const count = getMathMassCount();
      if (!count) return;

      const container = document.getElementById('mathSheetsContainer');
      container.innerHTML = '';

      for (let i = 1; i <= count; i++) {
        const problems = buildMathProblems(s);
        container.appendChild(buildMathWrapper(problems, i, count, s, false));
      }

      mathMassGenerated = true;
      const banner = document.getElementById('mathPreviewBanner');
      banner.style.display = 'block';
      document.getElementById('mathPreviewLabel').textContent =
        `${count} math sheet${count > 1 ? 's' : ''} — ${s.op === 'mixed' ? 'Mixed' : s.op}, ${s.count} problems each`;
      banner.scrollIntoView({ behavior: 'smooth' });
    }

    function printMathMass() {
      if (!mathMassGenerated) {
        generateMathMass();
        setTimeout(() => window.print(), 500);
      } else {
        window.print();
      }
    }

    function clearMathPreview() {
      document.getElementById('mathSheetsContainer').innerHTML = '';
      document.getElementById('mathPreviewBanner').style.display = 'none';
      mathMassGenerated = false;
    }

    function pdfOptions(filename) {
      return {
        margin: 0.4,
        filename: filename,
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { scale: 2, useCORS: true },
        jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' },
        pagebreak: { mode: ['css', 'legacy'], before: '.pdf-page-break' }
      };
    }

    function setButtonLoading(btn, loading) {
      if (loading) {
        btn.dataset.original = btn.innerHTML;
        btn.innerHTML = '<span class="spinner"></span> Generating…';
        btn.disabled = true;
      } else {
        btn.innerHTML = btn.dataset.original;
        btn.disabled = false;
      }
    }

    function downloadSinglePDF(sheetEl, opts) {
      const btn = sheetEl.querySelector('.btn-teal');

      // Build a clean print-only clone (no header/buttons)
      const clone = document.createElement('div');
      if (opts.title) {
        const t = document.createElement('div');
        t.style.cssText = 'text-align:center;font-size:16px;font-weight:bold;margin-bottom:10px;font-family:Arial,sans-serif;';
        t.textContent = opts.title;
        clone.appendChild(t);
      }
      const grid = sheetEl.querySelector('.grid').cloneNode(true);
      // Inline essential grid styles
      grid.style.cssText = 'display:grid;grid-template-columns:repeat(10,1fr);gap:3px;';
      grid.querySelectorAll('.cell').forEach(c => {
        c.style.cssText = 'border:2px solid #555;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:bold;font-family:Arial,sans-serif;min-height:52px;aspect-ratio:1;' +
          (c.classList.contains('filled') ? 'background:#f7f7f7;color:#222;' : 'background:white;');
      });
      clone.appendChild(grid);

      const filename = `number-sheet-${opts.start}-${opts.end}${opts.title ? '-' + opts.title.replace(/\s+/g,'-') : ''}.pdf`;
      setButtonLoading(btn, true);
      html2pdf().set(pdfOptions(filename)).from(clone).save().then(() => setButtonLoading(btn, false));
    }

    function downloadMassPDF() {
      const btn = document.getElementById('massDownloadBtn');
      const sheets = document.querySelectorAll('.sheet-wrapper');
      if (!sheets.length) return;

      const s = getSettings();
      const count = sheets.length;
      const filename = `number-sheets-${s ? s.start + '-' + s.end : 'download'}-x${count}.pdf`;

      // Build clean clone of all sheets with page breaks
      const container = document.createElement('div');
      sheets.forEach((sheet, i) => {
        const wrap = document.createElement('div');
        if (i > 0) wrap.classList.add('pdf-page-break');
        wrap.style.cssText = 'padding:10px;';

        const titleEl = sheet.querySelector('.sheet-print-title');
        if (titleEl) {
          const t = titleEl.cloneNode(true);
          t.style.cssText = 'text-align:center;font-size:16px;font-weight:bold;margin-bottom:10px;font-family:Arial,sans-serif;';
          wrap.appendChild(t);
        }

        const grid = sheet.querySelector('.grid').cloneNode(true);
        grid.style.cssText = 'display:grid;grid-template-columns:repeat(10,1fr);gap:3px;';
        grid.querySelectorAll('.cell').forEach(c => {
          c.style.cssText = 'border:2px solid #555;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:bold;font-family:Arial,sans-serif;min-height:52px;aspect-ratio:1;' +
            (c.classList.contains('filled') ? 'background:#f7f7f7;color:#222;' : 'background:white;');
        });
        wrap.appendChild(grid);
        container.appendChild(wrap);
      });

      setButtonLoading(btn, true);
      html2pdf().set(pdfOptions(filename)).from(container).save().then(() => setButtonLoading(btn, false));
    }
  </script>

</body>
</html>
